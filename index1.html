<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دليلك الإسلامي اليومي</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
  --green-dark: #5A1F2B;
  --green-mid: #7B2E3B;
  --green-light: #B46A75;
  --gold: #D9B15F;
  --gold-light: #E9C983;
  --bg: #FBF4EC;
  --bg-card: #FFFFFF;
  --bg-pattern: #F0E5D9;
  --text-main: #1E1A1A;
  --text-sub: #5F5656;
  --text-light: #8B7F7F;
  --border: #E3D4C7;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --font-size: 18px;
    }
    body.dark {
      --bg: #121212;
      --bg-card: #1e1e1e;
      --bg-pattern: #181818;
      --text-main: #f0ede6;
      --text-sub: #b0a89a;
      --text-light: #888;
      --border: #333;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Naskh Arabic', 'Amiri', serif;
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ─── Islamic Pattern Background ─── */
    .pattern-bg {
      background-color: var(--bg);
      background-image:
        linear-gradient(135deg, var(--bg-pattern) 25%, transparent 25%),
        linear-gradient(225deg, var(--bg-pattern) 25%, transparent 25%),
        linear-gradient(45deg,  var(--bg-pattern) 25%, transparent 25%),
        linear-gradient(315deg, var(--bg-pattern) 25%, var(--bg) 25%);
      background-size: 32px 32px;
      background-position: 16px 0, 16px 0, 0 0, 0 0;
    }

    /* ─── Header ─── */
    header {
background: linear-gradient(135deg, #5A1F2B 0%, #7B2E3B 100%);
      color: #fff;
      text-align: center;
      padding: 20px 16px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      transform: translateY(0);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }
    header.hidden {
      transform: translateY(-100%);
      box-shadow: none;
    }
    .basmala {
      font-family: 'Amiri', serif;
      font-size: 2.1rem;
      color: var(--gold-light);
      letter-spacing: 1px;
      line-height: 1.4;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.75);
      margin: 4px 0 12px;
    }
    .header-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .font-row {
      display: inline-flex;
      align-items: center;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 4px 12px;
      gap: 8px;
    }
    .font-row button {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      opacity: 0.9;
      transition: opacity 0.2s;
    }
    .font-row button:hover { opacity: 1; }
    .font-row span {
      color: #fff;
      font-size: 0.95rem;
      min-width: 24px;
      text-align: center;
    }
    .font-row .font-T {
      font-family: 'Noto Naskh Arabic', serif;
      font-weight: 700;
      font-size: 1rem;
      border-right: 1px solid rgba(255,255,255,0.3);
      padding-right: 10px;
    }
    .theme-btn,
    .search-toggle-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 1.2rem;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .theme-btn:hover,
    .search-toggle-btn:hover,
    .search-toggle-btn.active {
      background: rgba(255,255,255,0.25);
    }
    .header-search-panel {
      margin-top: 12px;
      display: flex;
      justify-content: center;
    }
    .header-search-panel[hidden] {
      display: none !important;
    }
    .header-search-input {
      width: min(100%, 560px);
      padding: 12px 16px;
      border: 1.5px solid rgba(255,255,255,0.24);
      border-radius: 14px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 0.95rem;
      backdrop-filter: blur(8px);
    }
    .header-search-input::placeholder {
      color: rgba(255,255,255,0.72);
    }
    .header-search-input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.18);
    }

    /* ─── Navigation Tabs ─── */
    nav {
      background: var(--bg-card);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      justify-content: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 110px;
      z-index: 99;
      flex-wrap: wrap;
      transition: top 0.35s ease;
    }
    .tab-btn {
      padding: 8px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-main);
      cursor: pointer;
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--green-dark);
      color: #fff;
      border-color: var(--green-dark);
    }
    .tab-btn:hover:not(.active) {
      border-color: var(--green-mid);
      color: var(--green-dark);
    }

    /* ─── Main Content ─── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 12px 40px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ─── Daily Dua Card ─── */
    .daily-dua-card {
      background: linear-gradient(135deg, #fffbf0, #fff8e6);
      border: 1.5px solid var(--gold);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
  	display: none;

    }
    body.dark .daily-dua-card {
      background: linear-gradient(135deg, #2a2210, #1e1a08);
      border-color: var(--gold);
    }
    .daily-dua-card .section-label {
      color: var(--gold);
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-end;
    }
    .daily-dua-text {
      font-family: 'Amiri', serif;
      font-size: 1.35rem;
      line-height: 1.9;
      text-align: center;
      color: var(--text-main);
      padding: 12px 0;
    }
    .daily-dua-desc {
      font-size: 0.82rem;
      color: var(--text-light);
      text-align: center;
      margin-top: 8px;
    }

    /* ─── Section Heading ─── */
    .section-heading {
      text-align: center;
      margin-bottom: 16px;
    }
    .section-heading h2 {
      font-size: 1.4rem;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    .section-heading p {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    /* ─── Category Browser ─── */
    .category-filter {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .level-tabs,
    .sublevel-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .sublevel-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .sublevel-wrap[hidden] {
      display: none !important;
    }
    .sublevel-title {
      text-align: center;
      color: var(--text-light);
      font-size: 0.82rem;
      margin-bottom: 8px;
    }
    .cat-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      color: var(--text-sub);
      cursor: pointer;
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 0.82rem;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .level2-btn {
      font-weight: 700;
      padding: 8px 16px;
    }
    .cat-btn.active {
      background: var(--green-dark);
      color: #fff;
      border-color: var(--green-dark);
    }
    .cat-btn:hover:not(.active) {
      border-color: var(--green-mid);
    }

    /* ─── Dua Cards ─── */
    .dua-list { display: flex; flex-direction: column; gap: 16px; }
    .dua-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.15s;
    }
    .dua-card:hover { transform: translateY(-1px); }

    .dua-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .dua-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-main);
    }
    .dua-icon { font-size: 1.1rem; }

    .dua-text-box {
      background: var(--bg);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    body.dark .dua-text-box { background: #111; }
    .dua-text {
      font-family: 'Amiri', serif;
      font-size: var(--font-size);
      line-height: 2;
      text-align: center;
      color: var(--text-main);
      transition: font-size 0.2s;
      white-space: pre-line;

    }

    .dua-desc {
      font-size: 0.8rem;
      color: var(--text-light);
      text-align: center;
      margin-bottom: 12px;
      font-style: italic;
    }

    /* ─── Counter (single row) ─── */
    .counter-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .counter-label { color: var(--text-light); font-size: 0.8rem; white-space: nowrap; }
    .counter-nums  { color: var(--green-mid); font-weight: 700; font-size: 0.82rem; white-space: nowrap; }
    .counter-bar-track {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .counter-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-mid), var(--gold));
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }
    .counter-done {
      font-size: 0.78rem;
      color: var(--green-mid);
      font-weight: 700;
      white-space: nowrap;
    }
    .btn-tasbeeh {
      flex-shrink: 0;
      padding: 7px 20px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-tasbeeh:hover { background: var(--green-mid); }
    .btn-tasbeeh:disabled { background: #aaa; cursor: not-allowed; }
    .btn-reset {
      flex-shrink: 0;
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text-light);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-reset:hover { border-color: var(--green-mid); color: var(--green-mid); }

    /* ─── Action Row (counter + share on one line) ─── */
    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .action-row .counter-section {
      flex: 1;
      margin-bottom: 0;
      min-width: 0;
    }
    .action-row .share-row {
      flex-shrink: 0;
    }
    /* separator between counter and share */
    .action-row .share-row::before {
      content: '';
      display: block;
      width: 1px;
      height: 24px;
      background: var(--border);
      margin-left: 2px;
    }

    /* ─── Share Buttons ─── */
    .share-row {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-end;
    }
    .btn-share {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-share svg { display: block; }
    .btn-copy {
      background: #f1f5f1;
      color: var(--text-sub);
    }
    .btn-copy:hover { background: #ddeedd; color: var(--green-mid); }
    .btn-whatsapp {
      background: #e8f5ee;
      color: var(--green-dark);
    }
    .btn-whatsapp:hover { background: #c8e6d4; color: var(--green-dark); }
    .btn-image {
      background: #fdf6e3;
      color: var(--gold);
    }
    .btn-image:hover { background: #fbe9b0; color: #a07820; }

    /* ─── Mood Section ─── */
    .mood-section { text-align: center; }
    .mood-heading {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
    }
    .mood-sub {
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 20px;
    }
    .mood-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .mood-btn {
      padding: 8px 18px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      color: var(--text-main);
      cursor: pointer;
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .mood-btn.active {
      background: var(--green-dark);
      color: #fff;
      border-color: var(--green-dark);
    }
    .mood-btn:hover:not(.active) {
      border-color: var(--green-mid);
    }
    .mood-results { text-align: right; }
    .mood-placeholder {
      color: var(--text-light);
      font-size: 1rem;
      padding: 40px 0;
    }

    /* ─── Qibla Section ─── */
    .qibla-section { text-align: center; }
    .qibla-heading {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .qibla-sub {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: 28px;
    }

    /* Compass */
    .compass-wrap {
      display: inline-block;
      position: relative;
      margin-bottom: 20px;
    }
    .compass-outer {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5f0e8, #e8e0d0);
      border: 3px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15), inset 0 2px 6px rgba(0,0,0,0.08);
      position: relative;
    }
    body.dark .compass-outer {
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    }
    .compass-inner {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8e0d0, #d4c9b0);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      position: relative;
    }
    body.dark .compass-inner { background: linear-gradient(135deg, #333, #222); }

    .compass-needle {
      width: 40px;
      height: 40px;
      transition: transform 1s cubic-bezier(0.4,0,0.2,1);
      font-size: 28px;
    }

    .compass-dir {
      position: absolute;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Noto Naskh Arabic', serif;
    }
    .dir-n { top: 10px; left: 50%; transform: translateX(-50%); }
    .dir-s { bottom: 10px; left: 50%; transform: translateX(-50%); }
    .dir-e { right: 10px; top: 50%; transform: translateY(-50%); }
    .dir-w { left: 10px; top: 50%; transform: translateY(-50%); }

    .qibla-status {
      font-size: 0.9rem;
      color: var(--text-sub);
      margin-bottom: 16px;
      min-height: 24px;
    }
    .qibla-angle {
      font-size: 1.1rem;
      color: var(--green-mid);
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* City select */
    .city-select-wrap {
      margin-bottom: 16px;
    }
    .city-select-wrap label {
      font-size: 0.85rem;
      color: var(--text-sub);
      display: block;
      margin-bottom: 6px;
    }
    .city-select {
      width: 100%;
      max-width: 280px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      color: var(--text-main);
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 0.9rem;
    }

    .btn-locate {
      background: var(--green-dark);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 1rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .btn-locate:hover { background: var(--green-mid); }

    /* ─── Footer ─── */
    footer {
      background: var(--green-dark);
      color: rgba(255,255,255,0.8);
      text-align: center;
      padding: 14px 16px;
      font-family: 'Amiri', serif;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #222;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'Noto Naskh Arabic', serif;
      z-index: 999;
      transition: transform 0.3s;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── Hidden canvas for image generation ─── */
    #img-canvas { display: none; }

    /* ─── Qibla v2 ─── */
    .qibla-v2 { display:grid; gap:14px; }
    .qibla-v2 .qcard {
      background: #5A1F2B;
      border: 1px solid rgba(217,177,95,0.25);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }
    .qibla-v2 .qhero { padding:20px 18px 16px; text-align:center; }
    .qibla-v2 .qbadge {
      display:inline-block; background:rgba(217,177,95,0.18); color:#E9C983;
      border:1px solid rgba(217,177,95,0.35); border-radius:999px;
      padding:8px 14px; font-size:13px; font-weight:700; margin-bottom:12px;
    }
    .qibla-v2 .qhero h2 { margin:0 0 8px; font-size:26px; color:#FBF4EC; }
    .qibla-v2 .qsub { margin:0; color:rgba(251,244,236,0.7); font-size:14px; line-height:1.7; }
    .qibla-v2 .compass-card2 { padding:18px; }
    .qibla-v2 .compass-area2 {
      position:relative; width:min(100%, 320px); aspect-ratio:1/1;
      margin:0 auto 14px; display:grid; place-items:center;
    }
    .qibla-v2 .qcompass {
      position:absolute; inset:0; border-radius:50%;
      background: #3D1520;
      border:2px solid rgba(217,177,95,0.35);
      box-shadow: inset 0 0 0 10px rgba(0,0,0,0.1), 0 0 30px rgba(217,177,95,0.1);
    }
    .qibla-v2 .qring { position:absolute; inset:0; transition:transform .18s linear; }
    .qibla-v2 .qtick {
      position:absolute; left:50%; top:4%; width:2px; height:10%;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(217,177,95,0.8), rgba(217,177,95,0.05));
      transform-origin:center 410%;
    }
    .qibla-v2 .qtick.small { height:6%; opacity:.35; width:1px; }
    .qibla-v2 .qcardinal {
      position:absolute; left:50%; top:50%; width:34px; margin-left:-17px; margin-top:-12px;
      text-align:center; font-weight:800; color:rgba(251,244,236,0.6); font-size:14px;
    }
    .qibla-v2 .qcardinal.n { color:#E9C983; }
    .qibla-v2 .qcenter {
      position:absolute; width:22px; height:22px; border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fff, #f6f1e7 25%, #D9B15F 55%, #7a5018 100%);
      z-index:5; box-shadow:0 0 0 6px rgba(217,177,95,0.15);
    }
    .qibla-v2 .qibla-arrow-wrap2 {
      position:absolute; inset:0; transition:transform .18s linear; z-index:3;
    }
    .qibla-v2 .qibla-arrow2 {

// ═══════════════════ RENDER ═══════════════════
function buildDuaCard(dua, context) {
  const hasCounter = dua.count !== null;
  const cur = hasCounter ? (counters[dua.id] || 0) : 0;
  const done = hasCounter && cur >= dua.count;

  return `
    <div class="dua-card" id="dua-${dua.id}-${context}">
      <div class="dua-header">
        <span class="dua-icon">📖</span>
        <span class="dua-title">${dua.title}</span>
      </div>
      <div class="dua-text-box">
        <div class="dua-text" style="font-size:${fontSize}px">${dua.text}</div>
      </div>
      <div class="dua-desc">${dua.desc}</div>

      <div class="action-row">
        ${hasCounter ? `
          <div class="counter-section" id="counter-${dua.id}-${context}">
            <button class="btn-tasbeeh" ${done ? 'disabled' : ''} onclick="incrementCount(${dua.id}, '${context}')">عدّ</button>
            <div class="counter-bar-track">
              <div class="counter-bar-fill" style="width:${pct}%"></div>
            </div>
            <span class="counter-label">العدد:</span>
            <span class="counter-nums">${cur} / ${dua.count}</span>
            ${done ? `<span class="counter-done">✓ اكتمل</span>` : ''}
            <button class="btn-reset" onclick="resetCount(${dua.id}, '${context}')" title="إعادة">↺</button>
          </div>
        ` : '<div style="flex:1"></div>'}
        <div class="share-row">
          <button class="btn-share btn-copy" onclick="copyDua(${dua.id})" title="نسخ">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="btn-share btn-whatsapp" onclick="shareWhatsApp(${dua.id})" title="واتساب">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          </button>
          <button class="btn-share btn-image" onclick="downloadImage(${dua.id})" title="تحميل صورة">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
      </div>
    </div>
  `;
}

function renderDuas(list, containerId, context) {
  const el = document.getElementById(containerId);
  if (!list.length) {
    el.innerHTML = '<div class="mood-placeholder">لا توجد نتائج مطابقة حالياً</div>';
    return;
  }
  el.innerHTML = list.map(d => buildDuaCard(d, context)).join('');
  updateFontSizes();
}

// ═══════════════════ DAILY DUA ═══════════════════
function setDailyDua() {
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
  const daily = duas[dayOfYear % duas.length];
  document.getElementById('daily-dua-text').textContent = daily.text;
  document.getElementById('daily-dua-desc').textContent = daily.desc;
}

// ═══════════════════ TAB SWITCHING ═══════════════════
function switchTab(tab, options = {}) {
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (options.updateHash !== false) updateHash();
}

// ═══════════════════ CATEGORY FILTER ═══════════════════
function getGroupConfig(groupId) {
  return CATEGORY_GROUPS.find(group => group.id === groupId) || CATEGORY_GROUPS[0];
}

function getDuaCategories(dua) {
  const raw = dua.categories ?? dua.category ?? [];
  if (Array.isArray(raw)) return raw;
  return raw ? [raw] : [];
}

function normalizeArabicText(text) {
  return String(text || '')
    .toLowerCase()
    .normalize('NFKD')
    .replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function matchesSearch(dua, term) {
  if (!term) return true;
  const haystack = normalizeArabicText([
    dua.title,
    dua.text,
    dua.desc,
    ...getDuaCategories(dua)
  ].join(' '));
  return haystack.includes(term);
}

function matchesAnyCategory(dua, categories) {
  if (!categories || !categories.length) return true;
  const duaCategories = getDuaCategories(dua);
  return categories.some(category => duaCategories.includes(category));
}

function getActiveCategories() {
  if (currentSearch.trim()) return [];
  if (currentGroup === 'all') return [];
  if (currentSub !== 'all') return [currentSub];
  return getGroupConfig(currentGroup).categories || [];
}

function getFilteredDuas() {
  const term = normalizeArabicText(currentSearch);
  if (term) {
    return duas.filter(dua => matchesSearch(dua, term));
  }
  const activeCategories = getActiveCategories();
  return duas.filter(dua => matchesAnyCategory(dua, activeCategories));
}

function renderMainDuas() {
  renderDuas(getFilteredDuas(), 'duas-list', 'main');
}

function renderLevel2Tabs() {
  const container = document.getElementById('level2-tabs');
  if (!container) return;
  container.innerHTML = CATEGORY_GROUPS.map(group => `
    <button class="cat-btn level2-btn ${group.id === currentGroup ? 'active' : ''}" onclick="selectGroup('${group.id}')">${group.label}</button>
  `).join('');
}

function renderLevel3Tabs() {
  const wrap = document.getElementById('level3-wrap');
  const title = document.getElementById('level3-title');
  const container = document.getElementById('level3-tabs');
  if (!wrap || !title || !container) return;

  const group = getGroupConfig(currentGroup);
  if (!group.subs || !group.subs.length) {
    wrap.hidden = true;
    title.textContent = '';
    container.innerHTML = '';
    return;
  }

  wrap.hidden = false;
  <!-- title.textContent = `التفريع داخل ${group.title || group.label}`;  -->
  const subItems = [{ id: 'all', label: '🔖 الكل' }, ...group.subs];
  container.innerHTML = subItems.map(item => `
    <button class="cat-btn ${item.id === currentSub ? 'active' : ''}" onclick="selectSub('${item.id}')">${item.label}</button>
  `).join('');
}

function selectGroup(groupId, options = {}) {
  currentGroup = getGroupConfig(groupId).id;
  currentSub = 'all';
  renderLevel2Tabs();
  renderLevel3Tabs();
  renderMainDuas();
  if (options.updateHash !== false) updateHash();
}

function selectSub(subId, options = {}) {
  currentSub = subId;
  renderLevel3Tabs();
  renderMainDuas();
  if (options.updateHash !== false) updateHash();
}

function updateSearchUI() {
  const panel = document.getElementById('header-search-panel');
  const button = document.getElementById('search-toggle-btn');
  if (panel) panel.hidden = !searchOpen;
  if (button) button.classList.toggle('active', searchOpen || !!currentSearch.trim());
}

function toggleSearch(forceOpen) {
  if (typeof forceOpen === 'boolean') {
    searchOpen = forceOpen;
  } else {
    searchOpen = !searchOpen;
  }

  if (!searchOpen && currentSearch.trim()) {
    currentSearch = '';
    const searchEl = document.getElementById('dua-search');
    if (searchEl) searchEl.value = '';
    renderMainDuas();
  }

  updateSearchUI();
  if (searchOpen) {
    const searchEl = document.getElementById('dua-search');
    if (searchEl) searchEl.focus();
  }
  updateHash();
}

function handleSearchInput(value) {
  currentSearch = value;
  if (currentSearch.trim()) {
    searchOpen = true;
    if (currentTab !== 'duas') switchTab('duas', { updateHash: false });
  }
  updateSearchUI();
  renderMainDuas();
  updateHash();
}

function readHashState() {
  const hash = window.location.hash.replace(/^#/, '');
  const params = new URLSearchParams(hash);
  return {
    tab: params.get('tab') || 'duas',
    group: params.get('group') || 'all',
    sub: params.get('sub') || 'all',
    q: params.get('q') || '',
    search: params.get('search') || '0'
  };
}

function updateHash() {
  const params = new URLSearchParams();
  if (currentTab !== 'duas') params.set('tab', currentTab);
  if (currentGroup !== 'all') params.set('group', currentGroup);
  if (currentSub !== 'all') params.set('sub', currentSub);
  if (currentSearch.trim()) params.set('q', currentSearch.trim());
  if (searchOpen && !currentSearch.trim()) params.set('search', '1');
  const hash = params.toString();
  const url = hash ? ('#' + hash) : (window.location.pathname + window.location.search);
  history.replaceState(null, '', url);
}

function applyHashState() {
  const state = readHashState();
  const safeTab = document.getElementById('panel-' + state.tab) ? state.tab : 'duas';
  const group = getGroupConfig(state.group);
  const safeSub = (group.subs || []).some(item => item.id === state.sub) ? state.sub : 'all';

  currentGroup = group.id;
  currentSub = safeSub;
  currentSearch = state.q;
  searchOpen = state.search === '1' || !!state.q;

  const searchEl = document.getElementById('dua-search');
  if (searchEl) searchEl.value = currentSearch;

  switchTab(safeTab, { updateHash: false });
  updateSearchUI();
  renderLevel2Tabs();
  renderLevel3Tabs();
  renderMainDuas();
}

// ═══════════════════ MOOD FILTER ═══════════════════
let currentMood = null;
function filterMood(mood, btn) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  if (currentMood === mood) {
    currentMood = null;
    document.getElementById('mood-list').innerHTML = '<div class="mood-placeholder">اختر حالتك لعرض الأدعية المناسبة</div>';
    return;
  }
  currentMood = mood;
  btn.classList.add('active');
  const filtered = duas.filter(d => d.moods.includes(mood));
  renderDuas(filtered, 'mood-list', 'mood');
}

// ═══════════════════ COUNTER ═══════════════════
function incrementCount(id, ctx) {
  const dua = duas.find(d => d.id === id);
  if (!dua || counters[id] >= dua.count) return;
  counters[id]++;
  refreshCounter(id, ctx, dua);
}

function resetCount(id, ctx) {
  counters[id] = 0;
  const dua = duas.find(d => d.id === id);
  refreshCounter(id, ctx, dua);
}

function refreshCounter(id, ctx, dua) {
  const cur = counters[id];
  const done = cur >= dua.count;
  const pct = Math.min((cur / dua.count) * 100, 100);
  const el = document.getElementById(`counter-${id}-${ctx}`);
  if (!el) return;
  el.querySelector('.counter-nums').textContent = `${cur} / ${dua.count}`;
  el.querySelector('.counter-bar-fill').style.width = pct + '%';
  const doneEl = el.querySelector('.counter-done');
  if (done) {
    if (!doneEl) {
      const span = document.createElement('span');
      span.className = 'counter-done';
      span.textContent = '✓ اكتمل';
      el.querySelector('.btn-reset').before(span);
    }
    el.querySelector('.btn-tasbeeh').disabled = true;
  } else {
    if (doneEl) doneEl.remove();
    el.querySelector('.btn-tasbeeh').disabled = false;
  }
}

function sanitizeFileName(name) {
  return (name || 'dua')
    .replace(/[<>:"/\\|?*\u0000-\u001F]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function wrapText(ctx, text, maxWidth) {
  if (!text) return [];
  const paragraphs = String(text).split(/\n+/).map(p => p.trim()).filter(Boolean);
  const lines = [];

  paragraphs.forEach((paragraph, pIndex) => {
    const words = paragraph.split(/\s+/);
    let line = '';

    words.forEach(word => {
      const testLine = line ? `${line} ${word}` : word;
      if (ctx.measureText(testLine).width > maxWidth && line) {
        lines.push(line);
        line = word;
      } else {
        line = testLine;
      }
    });

    if (line) lines.push(line);

    if (pIndex < paragraphs.length - 1) {
      lines.push('');
    }
  });

  return lines;
}

function getTextLayout(ctx, text, maxWidth, fontFamily) {
  const presets = [
  { size: 64, lineHeight: 96 },
  { size: 58, lineHeight: 88 },
  { size: 52, lineHeight: 80 },
  { size: 48, lineHeight: 72 },
  { size: 44, lineHeight: 66 },
  { size: 40, lineHeight: 60 },
  { size: 36, lineHeight: 54 }
];

  for (const preset of presets) {
    ctx.font = `${preset.size}px ${fontFamily}`;
    const lines = wrapText(ctx, text, maxWidth);
    if (lines.length <= 11) {
      return {
        fontSize: preset.size,
        lineHeight: preset.lineHeight,
        lines
      };
    }
  }

  ctx.font = `42px ${fontFamily}`;
  return {
    fontSize: 42,
    lineHeight: 64,
    lines: wrapText(ctx, text, maxWidth)
  };
}

function drawRoundedRect(ctx, x, y, w, h, r) {
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

async function downloadImage(id) {
  await document.fonts.load('700 86px Amiri');
  await document.fonts.load('700 62px Amiri');
  await document.fonts.load('400 74px Amiri');
  await document.fonts.load('400 50px Amiri');
  await document.fonts.ready;

  const d = getDua(id);
  if (!d) return;

  const canvas = document.getElementById('img-canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = 1080;
  canvas.height = 1920;

  const W = canvas.width;
  const H = canvas.height;

  ctx.clearRect(0, 0, W, H);
  ctx.direction = 'rtl';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';

  // colors
const BG = '#5A1F2B';
const GOLD = '#D9B15F';
const TEXT = '#F4E7D6';

  // background
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // double border
  ctx.strokeStyle = GOLD;
  ctx.lineWidth = 8;
  ctx.strokeRect(34, 34, W - 68, H - 68);

  ctx.lineWidth = 2;
  ctx.strokeRect(54, 54, W - 108, H - 108);

  // basmala
  ctx.fillStyle = GOLD;
  ctx.font = '700 86px Amiri';
  ctx.fillText('﷽', W / 2, 155);

  // top divider
  ctx.strokeStyle = GOLD;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(180, 205);
  ctx.lineTo(W - 180, 205);
  ctx.stroke();

  // title
  ctx.fillStyle = GOLD;
  ctx.font = '700 62px Amiri';
  ctx.fillText(d.title || 'دعاء', W / 2, 365);

  // text layout
  const textLayout = getTextLayout(ctx, d.text || '', 860, 'Amiri');
  const duaLines = textLayout.lines;
  const duaFontSize = textLayout.fontSize;
  const duaLineHeight = textLayout.lineHeight;

  ctx.fillStyle = TEXT;
  ctx.font = `${duaFontSize}px Amiri`;

  const textBlockHeight = duaLines.length * duaLineHeight;
  const textTop = Math.max(520, 900 - textBlockHeight / 2);
  let y = textTop;

  duaLines.forEach(line => {
    if (line === '') {
      y += Math.round(duaLineHeight * 0.7);
    } else {
      ctx.fillText(line, W / 2, y);
      y += duaLineHeight;
    }
  });

  // lower divider
  //const dividerY = Math.min(y + 45, 1460);
  //ctx.strokeStyle = 'rgba(212,168,67,0.45)';
  //ctx.lineWidth = 1.5;
  //ctx.beginPath();
  //ctx.moveTo(180, dividerY);
  //ctx.lineTo(W - 180, dividerY);
  //ctx.stroke();

  // description box
  const desc = (d.desc || '').trim();
  if (desc) {
    ctx.font = '400 50px Amiri';
    const descLines = wrapText(ctx, desc, 850);
    const descLineHeight = 64;
    const boxHeight = Math.max(140, descLines.length * descLineHeight + 56);
    const boxY = 1510;

    ctx.fillStyle = 'rgba(240,230,208,0.12)';
    drawRoundedRect(ctx, 78, boxY, W - 156, boxHeight, 18);
    ctx.fill();

    ctx.fillStyle = TEXT;
    ctx.font = '400 50px Amiri';

    let descY = boxY + 68;
    descLines.forEach(line => {
      ctx.fillText(line, W / 2, descY);
      descY += descLineHeight;
    });
  }

  // footer
  ctx.fillStyle = GOLD;
  ctx.font = '700 34px Amiri';
  ctx.fillText(' اللهم تقبل منا ', W / 2, 1848);

  const a = document.createElement('a');
  a.download = `${sanitizeFileName(d.title)}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();

  showToast('✓ جاري التحميل...');
}

// ═══════════════════ QIBLA v2 ═══════════════════
(function(){
  const KAABA = { lat: 21.4225, lon: 39.8262 };
  let qiblaBearing2 = null;
  let qHeading = null;
  let qHasAbsoluteCompass = false;

  function toRad(d){ return d * Math.PI / 180; }
  function toDeg(r){ return r * 180 / Math.PI; }
  function norm(a){ return (a % 360 + 360) % 360; }

  function buildQTicks(){
    const ring = document.getElementById('qring2');
    if (!ring) return;
    for(let i = 0; i < 36; i++){
      const t = document.createElement('div');
      t.className = 'qtick' + (i % 3 ? ' small' : '');
      t.style.transform = `translateX(-50%) rotate(${i*10}deg)`;
      ring.appendChild(t);
    }
    [{t:'N',d:0,cls:'n'},{t:'E',d:90,cls:''},{t:'S',d:180,cls:''},{t:'W',d:270,cls:''}].forEach(item => {
      const el = document.createElement('div');
      el.className = 'qcardinal ' + item.cls;
      el.textContent = item.t;
      el.style.transform = `rotate(${item.d}deg) translateY(-120px) rotate(${-item.d}deg)`;
      ring.appendChild(el);
    });
  }

  function getQBearing(lat1, lon1, lat2, lon2){
    const p1=toRad(lat1), p2=toRad(lat2), dl=toRad(lon2-lon1);
    const y=Math.sin(dl)*Math.cos(p2);
    const x=Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl);
    return norm(toDeg(Math.atan2(y,x)));
  }

  function getQHeading(event){
    // iOS: always absolute magnetic north
    if(typeof event.webkitCompassHeading === 'number' && !Number.isNaN(event.webkitCompassHeading)){
      qHasAbsoluteCompass = true;
      return norm(event.webkitCompassHeading);
    }
    // Android: only trust alpha when the event is explicitly flagged absolute
    if(event.absolute === true && typeof event.alpha === 'number' && !Number.isNaN(event.alpha)){
      qHasAbsoluteCompass = true;
      return norm(360 - event.alpha);
    }
    return null; // non-absolute reading — ignore to avoid spurious spin
  }

  function setQStatus(text, cls){
    const el = document.getElementById('qStatusBox2');
    if(!el) return;
    el.className = 'qstatus' + (cls ? ' ' + cls : '');
    el.textContent = text;
  }

  function renderQibla(){
    const arrowWrap = document.getElementById('qiblaArrowWrap2');
    const ring = document.getElementById('qring2');
    const bearingText = document.getElementById('qBearingText');
    const headingText = document.getElementById('qHeadingText');

    // Arrow and ring only move once we have a confirmed GPS bearing
    if(qiblaBearing2 != null){
      if(bearingText) bearingText.textContent = Math.round(qiblaBearing2) + '°';
      if(arrowWrap) arrowWrap.style.transform = `rotate(${qiblaBearing2}deg)`;
      // Ring only spins with a verified absolute compass heading
      if(qHeading != null && qHasAbsoluteCompass && ring)
        ring.style.transform = `rotate(${-qHeading}deg)`;
    }
    if(qHeading != null && headingText)
      headingText.textContent = Math.round(qHeading) + '°';
  }

  function onQOrientation(event){
    const h = getQHeading(event);
    if(h == null) return; // skip non-absolute events
    qHeading = h;
    renderQibla();
    if(qiblaBearing2 != null)
      setQStatus('البوصلة تعمل ✓  حرّك الجوال حركة 8 إذا الاتجاه غير دقيق.', 'ok');
  }

  async function enableQCompass(){
    if(!window.isSecureContext){
      setQStatus('لازم تفتح الصفحة من HTTPS عشان البوصلة تشتغل.', 'danger');
      return;
    }
    try{
      if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
        const res = await DeviceOrientationEvent.requestPermission();
        if(res !== 'granted'){
          setQStatus('ما تم السماح للبوصلة. السهم يشير للقبلة بدون دوران مباشر.', 'danger');
          return;
        }
      }
      window.addEventListener('deviceorientationabsolute', onQOrientation, true);
      window.addEventListener('deviceorientation', onQOrientation, true);
    }catch(e){
      setQStatus('المتصفح ما سمح للبوصلة. بنستخدم الموقع فقط.', 'danger');
    }
  }

  function qLocate(){
    if(!navigator.geolocation){
      setQStatus('المتصفح ما يدعم تحديد الموقع.', 'danger');
      return;
    }
    setQStatus('⏳ جاري تحديد موقعك...');
    navigator.geolocation.getCurrentPosition(pos => {
      qiblaBearing2 = getQBearing(pos.coords.latitude, pos.coords.longitude, KAABA.lat, KAABA.lon);
      renderQibla();
      setQStatus(qHasAbsoluteCompass ? 'تم تحديد موقعك والقبلة جاهزة ✓' : 'تم تحديد موقعك — اتبع السهم الذهبي نحو الشمال.', 'ok');
    }, err => {
      setQStatus('ما قدرنا نجيب موقعك. تأكد إن الموقع مفعّل ومسموح للمتصفح.', 'danger');
    }, { enableHighAccuracy:true, timeout:15000, maximumAge:10000 });
  }

  async function qStart(){
    const btn = document.getElementById('qStartBtn2');
    if(btn){ btn.disabled = true; btn.textContent = '⏳ جاري التحميل...'; }
    await enableQCompass();
    qLocate();
    if(btn){ btn.disabled = false; btn.textContent = 'تشغيل محدد القبلة'; }
  }

  document.addEventListener('DOMContentLoaded', () => {
    buildQTicks();
    const btn = document.getElementById('qStartBtn2');
    if(btn) btn.addEventListener('click', qStart);
  });
})();

// ═══════════════════ TOAST ═══════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════ SCROLL HIDE/SHOW HEADER ═══════════════════
(function () {
  let lastY = 0;
  const THRESHOLD = 8; // px before we react
  window.addEventListener('scroll', () => {
    const currentY = window.scrollY;
    const header = document.querySelector('header');
    const nav    = document.getElementById('main-nav');
    const headerH = header.offsetHeight;

    if (currentY <= 10) {
      // At top — always show header
      header.classList.remove('hidden');
      nav.style.top = headerH + 'px';
    } else if (currentY > lastY + THRESHOLD) {
      // Scrolling DOWN — hide header, nav jumps to top
      header.classList.add('hidden');
      nav.style.top = '0px';
    } else if (currentY < lastY - THRESHOLD) {
      // Scrolling UP — show header, nav follows
      header.classList.remove('hidden');
      nav.style.top = headerH + 'px';
    }
    lastY = currentY;
  }, { passive: true });
})();
